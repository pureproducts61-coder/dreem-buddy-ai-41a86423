name: Security Gate

# Blocks merges if the security regression suite finds new RLS, audit, or XSS regressions.
# Uploads a JSON+text security report as a build artifact for every run.

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-gate:
    name: RLS / Audit / XSS regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security regression suite
        id: regression
        run: |
          mkdir -p security-report
          set +e
          bunx vitest run src/test/security.regression.test.ts \
            --reporter=default --reporter=json \
            --outputFile=security-report/vitest-results.json \
            | tee security-report/regression.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run dependency vulnerability scan (high+)
        if: always()
        run: |
          set +e
          bun audit --json > security-report/bun-audit.json 2>&1 || true
          npx --yes audit-ci@7 --high --report-type full --output-format text \
            > security-report/audit-ci.txt 2>&1
          echo "audit_exit=$?" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true
        id: audit

      - name: Summarize report
        if: always()
        run: |
          {
            echo "# 🛡️ Security Gate Report"
            echo
            echo "## Regression suite"
            echo '```'
            tail -n 80 security-report/regression.log || echo "no log"
            echo '```'
            echo
            echo "## Dependency audit (high+)"
            echo '```'
            tail -n 80 security-report/audit-ci.txt 2>/dev/null || echo "no audit output"
            echo '```'
          } > security-report/SUMMARY.md
          cat security-report/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_id }}
          path: security-report/
          retention-days: 30

      - name: Fail if regression suite failed
        if: steps.regression.outputs.exit_code != '0'
        run: |
          echo "::error::Security regression suite failed — merge blocked."
          exit 1